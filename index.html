<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARKI PHONE - PREMUIUM SYSTEM 2026</title>
    <style>
        :root { --bg: #050505; --gold: #d4af37; --neon: #39ff14; --card: #151515; --red: #ff4444; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 50px; }
        .header { position: sticky; top: 0; z-index: 2000; background: #000; border-bottom: 2px solid var(--gold); padding: 10px; text-align: center; }
        .rgb-clock { font-size: 30px; font-weight: 900; background: linear-gradient(90deg, red, lime, cyan, magenta, red); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 400%; animation: led 5s linear infinite; }
        .search-area { padding: 15px; background: #0a0a0a; text-align: center; border-bottom: 1px solid #222; }
        .search-input { width: 90%; max-width: 700px; padding: 15px; border-radius: 50px; border: 2px solid var(--gold); background: #000; color: #fff; font-size: 18px; text-align: center; outline: none; box-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .currency-bar { background: #111; padding: 8px; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 14px; border-bottom: 1px solid #333; }
        .currency-bar input { width: 90px; background: #000; border: 1px solid var(--neon); color: var(--neon); text-align: center; border-radius: 5px; padding: 3px; }
        .tabs { display: flex; justify-content: center; gap: 5px; padding: 10px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 15px; border-radius: 5px; border: 1px solid #444; background: #1a1a1a; color: #ccc; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; border: 1px solid #222; padding: 15px; position: relative; }
        .card-h { color: var(--gold); font-size: 17px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .price-tag { color: var(--neon); font-weight: bold; font-family: monospace; }
        .usd { color: #55acee; font-size: 11px; margin-left: 4px; }
        .pos-section { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-right: 4px solid var(--gold); }
        .pos-input { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; text-align: right; box-sizing: border-box; }
        .pos-btn { width: 100%; padding: 10px; background: var(--gold); border: none; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 5px; }
        .debt-list-item { display: flex; justify-content: space-between; align-items: center; background: #1a1010; padding: 10px; border-radius: 8px; margin-bottom: 5px; border: 1px solid #300; }
        @keyframes led { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div id="clock" class="rgb-clock">00:00:00</div>
</div>

<div class="search-area">
    <input type="text" id="mainSearch" class="search-input" placeholder="🔍 بۆ نموونە بنووسە: C55 یان S22..." onkeyup="doSearch()">
</div>

<div class="currency-bar">
    <span>١٠٠$ بە دینار:</span>
    <input type="number" id="rate" value="150000" oninput="updatePrices()">
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchPage('db', this)">📱 هەموو نرخەکان</button>
    <button class="tab-btn" onclick="switchPage('pos', this)">⚖️ حیساباتی ڕۆژانە</button>
    <button class="tab-btn" onclick="switchPage('debt', this)">🚩 لیستی قەرزەکان</button>
</div>

<div id="dbPage" class="container"></div>

<div id="posPage" class="container hidden">
    <div style="grid-column: 1/-1; text-align: center; font-size: 25px; color: var(--neon); margin-bottom: 15px;">کۆی گشتی: <span id="grandTotal">0</span> IQD</div>
    <div id="posContent" style="grid-column: 1/-1;" class="container"></div>
</div>

<div id="debtPage" class="container hidden">
    <div class="card" style="border-right: 4px solid var(--red);">
        <div class="card-h">تۆمارکردنی قەرز</div>
        <input type="text" id="debtName" class="pos-input" placeholder="ناوی کڕیار">
        <input type="number" id="debtAmount" class="pos-input" placeholder="بڕی قەرز">
        <button class="pos-btn" style="background:var(--red); color:white;" onclick="addDebt()">زیادکردن</button>
    </div>
    <div id="debtList" style="grid-column: 1/-1;"></div>
</div>

<script>
// --- داتابەیسی وردی شاشەکان ---
const harkiData = [
    {
        cat: "Realme & Infinix & Tecno (All Qualities)",
        items: [
            {n:"Realme C55 (Original)", p:19000}, {n:"Realme C55 (OLED)", p:16000}, {n:"Realme C55 (Incell)", p:13000},
            {n:"Realme C53 (Original)", p:18000}, {n:"Realme C53 (Incell)", p:12000},
            {n:"Realme 11 Pro+ (Original)", p:49000}, {n:"Realme 11 Pro+ (GX OLED)", p:38000},
            {n:"Infinix Smart 8 (Original)", p:13000}, {n:"Infinix Hot 40i (Original)", p:13000},
            {n:"Tecno Spark 20 (Original)", p:15000}, {n:"Tecno Camon 30 (Original)", p:18000}
        ]
    },
    {
        cat: "Samsung Service Pack (Original)",
        items: [
            {n:"A01 (A015)", p:19000}, {n:"A02 / M02", p:19000}, {n:"A03 Core / A035", p:19000},
            {n:"A04 / A04e / A04s", p:22000}, {n:"A05 / A05s", p:22000}, {n:"A10 / A10s / A11", p:19000},
            {n:"A12 / M12 / A13 / A14 / A15", p:22000}, {n:"A22 4G / M22", p:48000},
            {n:"A24 4G / A31 / A32 4G", p:42000}, {n:"A33 / A53 / A54 / A34 5G", p:75000},
            {n:"A52 / A52s / A72", p:100000}, {n:"A55 5G (A556)", p:115000},
            {n:"S21U / S22U", p:285000}, {n:"S23U / S24U", p:310000}, {n:"Note 20 Ultra", p:255000}
        ]
    },
    {
        cat: "iPhone Screens (High Quality)",
        items: [
            {n:"11 PM (Original)", p:18000}, {n:"11 PM (GX OLED)", p:15000}, {n:"11 PM (JK Incell)", p:12000},
            {n:"12 PM (Original)", p:115000}, {n:"12 PM (GX OLED)", p:43000}, {n:"12 PM (JK Incell)", p:22000},
            {n:"13 PM (JK Incell)", p:29000}, {n:"14 PM (Original)", p:287000}, {n:"15 PM (Original)", p:325000},
            {n:"16 PM (Original)", p:410000}
        ]
    },
    {
        cat: "Redmi / Poco / Xiaomi",
        items: [
            {n:"Note 13 Pro+ 5G", p:49000}, {n:"Note 13 4G (Frame)", p:44000}, {n:"Poco X6 Pro 5G", p:46000},
            {n:"Redmi 12 / 13C / Poco C65", p:21000}, {n:"Poco F5 Pro OLED", p:68000}
        ]
    },
    {
        cat: "🔌 پارچەکان (Parts)",
        items: [
            {n:"فلات شەحن iPhone 11-14", p:25000}, {n:"بۆرد شەحن S22 Ultra", p:35000}, {n:"سوکێت Samsung A10", p:5000}
        ]
    }
];

const posCats = ["📱 کڕین و فرۆشتن", "📺 شاشە", "🔋 پاتری", "🔌 شەحن", "🛠️ سۆفتوێر", "💳 کارت و ئاسیا", "🎒 ئیکسسوارات", "💸 خەرجی"];

function init() {
    updatePrices();
    const pc = document.getElementById('posContent');
    posCats.forEach((cat, idx) => {
        pc.innerHTML += `<div class="pos-section"><div style="color:var(--gold);margin-bottom:10px;">${cat}</div><input type="text" id="pn-${idx}" class="pos-input" placeholder="تێبینی"><input type="number" id="pp-${idx}" class="pos-input" placeholder="نرخ"><button class="pos-btn" onclick="addPos(${idx})">تۆمارکردن</button><div id="pl-${idx}" style="margin-top:10px;"></div></div>`;
    });
    renderPos(); renderDebt();
}

function updatePrices() {
    const rate = document.getElementById('rate').value;
    const db = document.getElementById('dbPage');
    db.innerHTML = "";
    harkiData.forEach(g => {
        let rows = g.items.map(i => `<div class="item-row"><span>${i.n}</span><span class="price-tag">${i.p.toLocaleString()} <small class="usd">($${(i.p/(rate/100)).toFixed(2)})</small></span></div>`).join('');
        db.innerHTML += `<div class="card"><div class="card-h">${g.cat}</div>${rows}</div>`;
    });
}

function switchPage(p, btn) {
    document.getElementById('dbPage').classList.toggle('hidden', p !== 'db');
    document.getElementById('posPage').classList.toggle('hidden', p !== 'pos');
    document.getElementById('debtPage').classList.toggle('hidden', p !== 'debt');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function doSearch() {
    let q = document.getElementById('mainSearch').value.toLowerCase();
    document.querySelectorAll('#dbPage .card, .item-row').forEach(el => {
        el.style.display = el.innerText.toLowerCase().includes(q) ? "" : "none";
    });
}

function addPos(idx) {
    let n = document.getElementById(`pn-${idx}`).value || "بێ ناو";
    let p = document.getElementById(`pp-${idx}`).value;
    if(!p) return;
    let data = JSON.parse(localStorage.getItem('h_pos_'+idx) || "[]");
    data.push({n, p: parseInt(p)});
    localStorage.setItem('h_pos_'+idx, JSON.stringify(data));
    document.getElementById(`pp-${idx}`).value = ""; renderPos();
}

function renderPos() {
    let grand = 0;
    posCats.forEach((_, idx) => {
        let data = JSON.parse(localStorage.getItem('h_pos_'+idx) || "[]");
        let list = document.getElementById(`pl-${idx}`); list.innerHTML = "";
        data.forEach((item, i) => {
            grand += item.p;
            list.innerHTML += `<div style="display:flex;justify-content:space-between;font-size:12px;background:#1a1a1a;padding:4px;margin-bottom:2px;"><span style="color:red" onclick="delPos(${idx},${i})">✕</span><span>${item.p.toLocaleString()}</span><span>${item.n}</span></div>`;
        });
    });
    document.getElementById('grandTotal').innerText = grand.toLocaleString();
}

function delPos(catIdx, itemIdx) {
    let data = JSON.parse(localStorage.getItem('h_pos_'+catIdx));
    data.splice(itemIdx, 1);
    localStorage.setItem('h_pos_'+catIdx, JSON.stringify(data));
    renderPos();
}

function addDebt() {
    let n = document.getElementById('debtName').value;
    let a = document.getElementById('debtAmount').value;
    if(!n || !a) return;
    let data = JSON.parse(localStorage.getItem('h_debt') || "[]");
    data.push({n, a: parseInt(a), d: new Date().toLocaleDateString()});
    localStorage.setItem('h_debt', JSON.stringify(data));
    document.getElementById('debtName').value = ""; document.getElementById('debtAmount').value = ""; renderDebt();
}

function renderDebt() {
    let data = JSON.parse(localStorage.getItem('h_debt') || "[]");
    document.getElementById('debtList').innerHTML = data.map((i, idx) => `
        <div class="debt-list-item">
            <button style="background:var(--neon);border:none;padding:5px 10px;font-weight:bold;" onclick="delDebt(${idx})">پاکاو</button>
            <div style="text-align:right">
                <div style="font-weight:bold;">${i.n}</div>
                <div style="color:var(--neon)">${i.a.toLocaleString()} IQD</div>
                <small style="color:#666">${i.d}</small>
            </div>
        </div>
    `).reverse().join('');
}

function delDebt(idx) { if(confirm("پاکاو بکرێت؟")) {
    let data = JSON.parse(localStorage.getItem('h_debt'));
    data.splice(idx, 1);
    localStorage.setItem('h_debt', JSON.stringify(data));
    renderDebt();
}}

setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
window.onload = init;
</script>
</body>
</html>
